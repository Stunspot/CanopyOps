<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CanopyOps operating flow</title>
  <desc id="desc">Cannabis crop evidence flows through CanopyOps into accountable operating artifacts while safety, legal, label, and approval authority remain with responsible people.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 12 6 0 12Z" fill="#48CBE8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0C1B26" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#FAFAFA"/>
  <rect width="1600" height="126" fill="#193449"/>
  <text x="800" y="58" text-anchor="middle" fill="#FAFAFA" font-family="Poppins, Hauora, Arial, sans-serif" font-size="40" font-weight="700">From cannabis crop evidence to accountable operations</text>
  <text x="800" y="96" text-anchor="middle" fill="#CCCDE4" font-family="Hauora, Poppins, Arial, sans-serif" font-size="21">CanopyOps preserves facts, uncertainty, provenance, and approval boundaries</text>

  <g filter="url(#shadow)">
    <rect x="72" y="210" width="410" height="430" rx="30" fill="#FFFFFF" stroke="#CCCDE4" stroke-width="4"/>
    <rect x="595" y="210" width="410" height="430" rx="30" fill="#193449"/>
    <rect x="1118" y="210" width="410" height="430" rx="30" fill="#FFFFFF" stroke="#CCCDE4" stroke-width="4"/>
  </g>

  <text x="277" y="272" text-anchor="middle" fill="#193449" font-family="Poppins, Hauora, Arial, sans-serif" font-size="31" font-weight="700">Crop evidence</text>
  <circle cx="130" cy="332" r="8" fill="#48CBE8"/><text x="155" y="341" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Stage and observations</text>
  <circle cx="130" cy="390" r="8" fill="#48CBE8"/><text x="155" y="399" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Environment and irrigation</text>
  <circle cx="130" cy="448" r="8" fill="#48CBE8"/><text x="155" y="457" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Logs and recent changes</text>
  <circle cx="130" cy="506" r="8" fill="#48CBE8"/><text x="155" y="515" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Facility constraints</text>
  <circle cx="130" cy="564" r="8" fill="#48CBE8"/><text x="155" y="573" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Unknowns and decisions</text>

  <text x="800" y="286" text-anchor="middle" fill="#48CBE8" font-family="Poppins, Hauora, Arial, sans-serif" font-size="45" font-weight="700">CanopyOps</text>
  <text x="800" y="333" text-anchor="middle" fill="#FAFAFA" font-family="Hauora, Arial, sans-serif" font-size="24">Structure · Calculate · Compare</text>
  <text x="800" y="372" text-anchor="middle" fill="#FAFAFA" font-family="Hauora, Arial, sans-serif" font-size="24">Diagnose without inventing certainty</text>
  <line x1="670" y1="416" x2="930" y2="416" stroke="#48CBE8" stroke-width="4"/>
  <text x="800" y="466" text-anchor="middle" fill="#CCCDE4" font-family="Hauora, Arial, sans-serif" font-size="23">Facts ≠ assumptions</text>
  <text x="800" y="509" text-anchor="middle" fill="#CCCDE4" font-family="Hauora, Arial, sans-serif" font-size="23">Evidence ranked by decision value</text>
  <text x="800" y="552" text-anchor="middle" fill="#CCCDE4" font-family="Hauora, Arial, sans-serif" font-size="23">Approval gates remain explicit</text>
  <text x="800" y="595" text-anchor="middle" fill="#CCCDE4" font-family="Hauora, Arial, sans-serif" font-size="23">Records remain inspectable</text>

  <text x="1323" y="272" text-anchor="middle" fill="#193449" font-family="Poppins, Hauora, Arial, sans-serif" font-size="31" font-weight="700">Operating artifacts</text>
  <circle cx="1175" cy="332" r="8" fill="#48CBE8"/><text x="1200" y="341" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Crop plans</text>
  <circle cx="1175" cy="390" r="8" fill="#48CBE8"/><text x="1200" y="399" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Incident workups</text>
  <circle cx="1175" cy="448" r="8" fill="#48CBE8"/><text x="1200" y="457" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Transparent calculations</text>
  <circle cx="1175" cy="506" r="8" fill="#48CBE8"/><text x="1200" y="515" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Harvest reviews</text>
  <circle cx="1175" cy="564" r="8" fill="#48CBE8"/><text x="1200" y="573" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="25">Operating records</text>

  <path d="M496 425H572" fill="none" stroke="#48CBE8" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M1019 425H1095" fill="none" stroke="#48CBE8" stroke-width="8" marker-end="url(#arrow)"/>

  <rect x="72" y="704" width="1456" height="126" rx="28" fill="#CCCDE4" opacity="0.62"/>
  <text x="800" y="754" text-anchor="middle" fill="#193449" font-family="Poppins, Hauora, Arial, sans-serif" font-size="27" font-weight="700">Responsible people retain authority</text>
  <text x="800" y="798" text-anchor="middle" fill="#193449" font-family="Hauora, Arial, sans-serif" font-size="22">Law · pesticide labels · safety controls · facility approvals · emergency procedures · direct control changes</text>
</svg>
