name: Verify CanopyOps

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-tests:
    name: Python 3.12 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic verification
        run: python -m unittest discover -s tests -v
